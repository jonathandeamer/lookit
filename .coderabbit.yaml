# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit — AI review on PRs. Advisory only, never a merge gate: the sole
# required check stays `test` (see CLAUDE.md). For a high-stakes change, withhold
# `gh pr merge --auto` and wait for the review instead of gating every PR.
# CLAUDE.md is the authoritative conventions source; CodeRabbit reads it as a
# guideline (knowledge_base below), so path_instructions stay terse + path-local.

language: en-US

# Global focus steer (<=250 chars), applied to every review.
tone_instructions: >-
  Solo-maintained Go finger TUI. Prioritize correctness and the documented
  security invariants (sanitize ingress/egress, port-79 pinning) over style
  nits. Respect the deliberate version pins (lipgloss v1) in CLAUDE.md.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  # Skip generated artifacts (regenerated, not hand-edited).
  path_filters:
    - "!THIRD_PARTY_NOTICES.md"
    - "!demo/*.gif"
  # Terse, path-local reminders only — the "why" lives in CLAUDE.md.
  path_instructions:
    - path: "render/**"
      instructions: >-
        Output is locked by golden-ANSI tests; byte-level changes to emitted
        styling are deliberate, not bugs.
    - path: "tui/**"
      instructions: >-
        Imports use the charm.land v2 paths (charm.land/bubbletea|bubbles|lipgloss
        /v2), NOT github.com/charmbracelet — don't flag these as wrong.
    - path: "finger/**"
      instructions: >-
        Security-critical: Query is the single sanitize chokepoint (ingress) and
        outbound queries reject control bytes (egress). Flag anything weakening this.
  tools:
    golangci-lint:
      enabled: true
    actionlint:
      enabled: true
    gitleaks:
      enabled: true

knowledge_base:
  # Make the CLAUDE.md dependency explicit rather than relying on the default.
  code_guidelines:
    filePatterns:
      - "CLAUDE.md"
      - "CONTRIBUTING.md"

chat:
  auto_reply: true
