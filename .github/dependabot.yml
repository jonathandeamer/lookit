version: 2
updates:
  # Keep the GitHub Actions pins current (this is what would have flagged the
  # checkout/setup-go Node-runtime bump). Grouped into one weekly PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Go modules. Security updates always; routine version bumps are grouped
  # weekly. The charm.land/...v2 deps move fast and want a human eye (run
  # `go mod tidy` after merging — see CLAUDE.md), so these are intentionally
  # PRs to review rather than auto-anything.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      gomod:
        patterns:
          - "*"
    ignore:
      # render/ intentionally stays on lipgloss v1; tui/ uses v2 via the
      # charm.land path. Block the v1 -> v2 migration of the github.com module
      # (a path-changing major bump) so an update can't silently break the
      # deliberate split — see CLAUDE.md.
      - dependency-name: "github.com/charmbracelet/lipgloss"
        update-types: ["version-update:semver-major"]
