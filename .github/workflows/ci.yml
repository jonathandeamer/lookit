name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      # The gate set (vet, gofmt-check, golangci-lint, race tests) lives in the
      # Makefile so local `make check` runs exactly what CI runs. golangci-lint
      # is fetched on demand at the version pinned in the Makefile.
      - name: check
        run: make check
