name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: vet
        run: go vet ./...
      - name: gofmt
        # gofmt -d prints diffs but always exits 0; we use -l (lists files
        # that would be reformatted) and fail if its output is non-empty.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt would reformat the following files:"
            echo "$out"
            exit 1
          fi
      - name: golangci-lint
        # Pinned + installed from source (no extra action) to match the rest of
        # this workflow. Config and exclusions live in .golangci.yml. For faster
        # cached runs you could swap this for golangci/golangci-lint-action.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...
      - name: test
        run: go test ./... -race
