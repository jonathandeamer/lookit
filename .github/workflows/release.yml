name: release

# Dormant until a version tag is pushed. To cut a release:
#   git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release and upload assets
  id-token: write # mint the OIDC token used to sign the build provenance
  attestations: write # record provenance for the release artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      # Pinned to immutable commit SHAs (not mutable tags): this job has
      # contents: write and a release token, so a retargeted tag must not be
      # able to run unreviewed code here. Dependabot keeps the SHAs current.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so the changelog can diff against the last tag
          persist-credentials: false # GoReleaser auths via GITHUB_TOKEN env, not git config; don't persist the token
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      # Mirrors ci.yml: CI calls a Makefile target so local and CI run the same
      # command. GoReleaser is fetched on demand at the pinned version.
      - name: release
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Sign build provenance for the redistributed archives + checksums, so a
      # downloader can run `gh attestation verify <file> --repo <owner>/<repo>`
      # and confirm the binary was built by this workflow from this commit.
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
