name: vuln

# Separate from ci so it has its own pass/fail check and — the point of a
# dedicated workflow — a weekly schedule. New CVEs are disclosed against code
# you've already shipped and aren't touching; the cron re-scans unchanged main
# so a fresh advisory on a dependency turns this red without a push.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # make vuln needs no git auth; don't leave the token in .git/config
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: govulncheck
        run: make vuln
